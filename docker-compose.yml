version: "3.9"

services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: velotrax-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - GRPC_AUTH_ADDR=${GRPC_AUTH_ADDR}
      - GRPC_CORE_ADDR=${GRPC_CORE_ADDR}
