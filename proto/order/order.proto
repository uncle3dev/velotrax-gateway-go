syntax = "proto3";

package order;

option go_package = "github.com/uncle3dev/velotrax-gateway-go/internal/gen/order";

message ListOrdersRequest {
  int32 page = 1;
  int32 page_size = 2;
  string status = 3;
}

message Address {
  string street = 1;
  string city = 2;
  string province = 3;
  string postal_code = 4;
  string country = 5;
}

message Order {
  string id = 1;
  string user_id = 2;
  string status = 3;
  string tracking_number = 4;
  Address origin_address = 5;
  Address destination_address = 6;
  string estimated_delivery = 7;
  double weight_kg = 8;
  string created_at = 9;
  string updated_at = 10;
}

message ListOrdersResponse {
  repeated Order orders = 1;
  int32 page = 2;
  int32 page_size = 3;
  int64 total = 4;
}

message GetOrderRequest {
  string id = 1;
}

message GetOrderResponse {
  Order order = 1;
}

message TrackingEvent {
  string status = 1;
  string location = 2;
  string note = 3;
  string happened_at = 4;
}

message GetOrderTrackingRequest {
  string id = 1;
}

message GetOrderTrackingResponse {
  string order_id = 1;
  repeated TrackingEvent events = 2;
}

service OrderService {
  rpc ListOrders(ListOrdersRequest) returns (ListOrdersResponse);
  rpc GetOrder(GetOrderRequest) returns (GetOrderResponse);
  rpc GetOrderTracking(GetOrderTrackingRequest) returns (GetOrderTrackingResponse);
}
